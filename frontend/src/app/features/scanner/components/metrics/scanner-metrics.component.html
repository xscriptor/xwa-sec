<section class="panel">
  <div class="metric-grid">
    <div class="hero-metric">
      <span class="t-label">PORTS_FOUND</span>
      <span class="t-display-xl">{{ vulnerabilitiesFound }}</span>
    </div>

    <div class="hero-metric">
      <span class="t-label">CONTACT_ARTIFACTS</span>
      <span class="t-display-xl">{{ contactsFound }}</span>
    </div>

    <div class="hero-metric">
      <span class="t-label">UNSANITIZED_SURFACES</span>
      <span class="t-display-xl">{{ unsanitizedFindings }}</span>
    </div>

    <div class="hero-metric">
      <span class="t-label">DELTA_OPEN_PORTS</span>
      <span class="t-display-xl">{{ latestOpenPortDelta === null ? '-' : latestOpenPortDelta }}</span>
    </div>
  </div>

  <div class="open-ports-wrap" *ngIf="openPortsDetailed.length">
    <span class="t-label">OPEN_PORTS_DETECTED</span>
    <div class="open-ports-grid">
      <div class="port-pill" *ngFor="let port of openPortsDetailed">
        <span class="port-token">{{ port.token }}</span>
        <span class="port-service">{{ port.service }}</span>
        <span class="port-version">{{ port.version }}</span>
      </div>
    </div>
  </div>
</section>
