<div class="terminal-container">
  <div class="terminal-header">
    <span class="t-label">[ X OUTPUT ]</span>
    <span class="status-indicator" [class.active]="isScanning">{{ isScanning ? 'LIVE' : 'IDLE' }}</span>
  </div>
  <div class="terminal">
    <div class="terminal-content">
      <div *ngFor="let line of lines" class="terminal-line">{{ line }}</div>
      <div *ngIf="isScanning" class="cursor">_</div>
    </div>
  </div>
</div>
