<div class="app-layout" [class.is-auth-route]="isAuthRoute()">
  <!-- SIDEBAR NAVIGATION -->
  <nav class="sidebar" aria-label="Main navigation" *ngIf="showShell()">
    <div class="brand">
      <h1 class="t-heading">SAMURAI</h1>
      <span class="t-label">XWA - MODULE</span>
    </div>

    <ul class="nav-links">
      <li>
        <a routerLink="/scanner" routerLinkActive="active" class="t-label">01 // SCANNER</a>
      </li>
      <li>
        <a routerLink="/recon" routerLinkActive="active" class="t-label">02 // WEB RECON</a>
      </li>
      <li>
        <a routerLink="/vulnerabilities" routerLinkActive="active" class="t-label">03 // VULNERABILITIES</a>
      </li>
      <li>
        <a routerLink="/history" routerLinkActive="active" class="t-label">04 // HISTORY & ARCHIVE</a>
      </li>
      <li *ngIf="isAdmin()">
        <a routerLink="/admin/users" routerLinkActive="active" class="t-label">99 // USERS (ADMIN)</a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <div class="user-chip" *ngIf="auth.isAuthenticated()">
        <span class="t-label user-name">{{ userLabel() }}</span>
        <span class="t-label user-role">{{ roleLabel() }}</span>
        <button type="button" class="logout-btn t-label" (click)="logout()" aria-label="Log out">
          LOGOUT
        </button>
      </div>

      <span class="t-label">v. 2.6.0</span>
      <button
        type="button"
        class="theme-toggle-btn"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.nextThemeAriaLabel()"
        [attr.title]="themeService.nextThemeAriaLabel()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M8 1.00195C6.61553 1.00195 5.26216 1.4125 4.11101 2.18167C2.95987 2.95084 2.06266 4.04409 1.53285 5.32317C1.00303 6.60225 0.86441 8.00972 1.13451 9.36759C1.4046 10.7255 2.07129 11.9727 3.05026 12.9517C4.02922 13.9307 5.27651 14.5974 6.63437 14.8675C7.99224 15.1375 9.3997 14.9989 10.6788 14.4691C11.9579 13.9393 13.0511 13.0421 13.8203 11.8909C14.5895 10.7398 15 9.38642 15 8.00195C15 6.14544 14.2625 4.36496 12.9498 3.05221C11.637 1.73945 9.85652 1.00195 8 1.00195ZM8 14.002V2.00195C9.5913 2.00195 11.1174 2.63409 12.2426 3.75931C13.3679 4.88453 14 6.41065 14 8.00195C14 9.59325 13.3679 11.1194 12.2426 12.2446C11.1174 13.3698 9.5913 14.002 8 14.002Z" />
          <g transform="translate(0 0) scale(1 1)">
            <path d="M1 11 L2 11 L5 14 L4 14 Z" />
            <path d="M4 11 L5 11 L2 14 L1 14 Z" />
          </g>
        </svg>
        <span>{{ themeService.nextThemeLabel() }}</span>
      </button>
      <div class="dot-grid-subtle branding-grid"></div>
    </div>
  </nav>

  <!-- MAIN CONTENT AREA -->
  <main id="main-content" class="main-content dot-grid-subtle" [class.full-width]="!showShell()" role="main" aria-label="Primary content">
    <router-outlet></router-outlet>
  </main>
</div>
