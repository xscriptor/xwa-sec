services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app/
      - /app/node_modules/
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_NAME=samurai
      - DB_USER=postgres
      - DB_PASS=postgres
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production-generate-with-openssl-rand-hex-64}
      - JWT_EXPIRE_MINUTES=60
      - FRONTEND_ORIGIN=http://localhost:4200
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=samurai
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d samurai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
